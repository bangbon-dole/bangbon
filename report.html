  }

  .table th, .table td {

  /* กำหนดความกว้างขั้นต่ำของแต่ละคอลัมน์เพื่อให้ข้อมูลไม่เบียดกัน */

<body>

  <div class="header-banner">
    <img src="<?= logoData ?>" onerror="this.src='https://lh3.googleusercontent.com/d/1AQ79fhA_-JNXfYIbWXYQXmtKa-VNAiWq'" class="logo-img mb-2">
    <h2>ศูนย์ส่งเสริมการเรียนรู้ระดับเขตบางบอน</h2>

  <div class="container mt-4">
    <div class="card p-4 mb-4 border-0 shadow-sm">
      <div class="row g-3">

          <label class="form-label">ชื่อ-นามสกุล</label>

        </div>
        <div class="col-md-2">
          <label class="form-label">เลือกเดือน</label>
          <select id="selMonth" class="form-select">
            <option value="">-- ทุกเดือน --</option>
            <option value="1">มกราคม</option>
            <option value="2">กุมภาพันธ์</option>
            <option value="3">มีนาคม</option>

            <option value="5">พฤษภาคม</option>

            <option value="7">กรกฎาคม</option>
            <option value="8">สิงหาคม</option>
            <option value="9">กันยายน</option>
            <option value="10">ตุลาคม</option>
            <option value="11">พฤศจิกายน</option>
            <option value="12">ธันวาคม</option>
          </select>
        </div>
        <div class="col-md-2">
          <label class="form-label">ระบุปี (พ.ศ.)</label>
          <input type="number" id="selYear" class="form-control" placeholder="เช่น 2569">
        </div>
        <div class="col-md-5 d-flex align-items-end gap-2">
          <button onclick="loadData()" class="btn btn-primary flex-grow-1">
            <i class="bi bi-search"></i> ค้นหาข้อมูล
          </button>
          <button onclick="refreshData()" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-clockwise"></i> รีเฟรช
          </button>
        </div>
      </div>
    </div>

    <div class="card p-0 overflow-hidden border-0 shadow-sm">
      <div class="table-responsive">
        <table class="table table-hover mb-0">
          <thead class="text-white">
            <tr>
              <th>วันที่/เวลา</th>
              <th>ชื่อ-นามสกุล</th>
              <th>ตำแหน่ง</th>
              <th>สถานะ</th>
              <th>หมายเหตุ</th>
              <th>ประจำเดือน</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="6" class="text-center p-5 text-muted">กรุณายืนยันรหัสผ่านเพื่อเข้าถึงข้อมูล</td></tr>
          </tbody>
        </table>

    <div class="mt-3 d-flex justify-content-between align-items-center">
      <a href="<Index" class="btn btn-secondary btn-sm">กลับหน้าหลัก</a>
      <div id="rowCount" class="text-muted small"></div>
    </div>
  </div>

  <script>
    let isAuthenticated = false; // ตัวแปรเช็คสถานะล็อกอิน

    document.addEventListener("DOMContentLoaded", function() {
      // 1. โหลดรายชื่อพนักงานรอไว้ใน Select
      google.script.run.withSuccessHandler(names => {
        const select = document.getElementById('selName');
        names.forEach(n => { let opt = new Option(n, n); select.add(opt); });
      }).getStaffNames();

      // 2. เรียกป๊อปอัพรหัสผ่านทันที
      checkAccess();
    });

    function checkAccess() {
      Swal.fire({
        title: 'ยืนยันรหัสผ่าน',
        text: 'เฉพาะเจ้าหน้าที่ที่เกี่ยวข้องเท่านั้น',
        input: 'password',
        inputAttributes: { autocapitalize: 'off' },
        showCancelButton: false,
        confirmButtonText: 'ตกลง',
        confirmButtonColor: '#1a5276',
        allowOutsideClick: false,
        allowEscapeKey: false
      }).then((result) => {
        const reportPass = "10150";
        if (result.value === reportPass) {
          isAuthenticated = true; // ปลดล็อก
          Swal.fire({
            icon: 'success',
            title: 'รหัสผ่านถูกต้อง',
            showConfirmButton: false,
            timer: 1000
          });
          loadData(); // <--- แสดงข้อมูลอัตโนมัติทันที
        } else {
          Swal.fire({
            icon: 'error',
            title: 'รหัสผ่านไม่ถูกต้อง!',
            confirmButtonText: 'กลับหน้าหลัก'
          }).then(() => {
            window.top.location.href = "<?= ScriptApp.getService().getUrl() ?>";
          });
        }
      });
    }

    function refreshData() {
      if(!isAuthenticated) return checkAccess();
      document.getElementById('selName').value = "";
      document.getElementById('selMonth').value = "";
      document.getElementById('selYear').value = "";
      loadData();
    }

    function loadData() {
      if(!isAuthenticated) return; // ถ้ายังไม่ผ่านรหัสผ่าน ไม่ต้องทำอะไร

      const tbody = document.getElementById('tableBody');
      const rowCountDiv = document.getElementById('rowCount');
      
      tbody.innerHTML = '<tr><td colspan="6" class="text-center p-4"><div class="spinner-border text-primary"></div><br>กำลังโหลดข้อมูล...</td></tr>';
      
      google.script.run.withSuccessHandler(data => {
        if(!data || data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="text-center p-5 text-danger">ไม่พบข้อมูลในระบบ</td></tr>';
          rowCountDiv.innerText = "พบ 0 รายการ";
          return;
        }
        
        rowCountDiv.innerText = `พบทั้งหมด ${data.length} รายการ`;
        tbody.innerHTML = data.map(item => {
          let statusClass = "bg-secondary";
          if (item.status === "ปฏิบัติงาน ณ สำนักงาน") statusClass = "bg-success";
          else if (item.status === "ไปราชการ") statusClass = "bg-primary";
          else if (item.status === "ลาป่วย") statusClass = "bg-warning text-dark";
          else if (item.status === "ลากิจ") statusClass = "bg-orange";
          else if (item.status === "ลาพักผ่อน") statusClass = "bg-info text-dark";
          else if (item.status === "ไปต่างประเทศ") statusClass = "bg-purple";

          return `
            <tr>
              <td class="small">${item.dateTime}</td>
              <td><b>${item.name}</b></td>
              <td class="small">${item.position}</td>
              <td><span class="badge ${statusClass}">${item.status}</span></td>
              <td><small>${item.note || '-'}</small></td>
              <td class="small">${item.month || '-'}</td>
            </tr>`;
        }).join('');
      }).getFilteredData(
        document.getElementById('selName').value,
        document.getElementById('selMonth').value,
        document.getElementById('selYear').value
      );
    }
  </script>
