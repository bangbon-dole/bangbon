<!DOCTYPE html>
<html lang="th">
<head>
  <base target="_top">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    :root { --primary-color: #0d6efd; --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); }
    body { background: var(--bg-gradient); font-family: 'Sarabun', sans-serif; min-height: 100vh; display: flex; align-items: center; padding: 20px 0; }
    .card { border: none; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.08); background: rgba(255, 255, 255, 0.95); }
    .header-section { background: #ffffff; padding: 35px 20px 25px; border-bottom: 1px solid #eee; border-radius: 24px 24px 0 0; text-align: center; }
    .logo-img { max-width: 90px; height: auto; }
    .form-label { font-weight: 600; }

  </style>
</head>
<body>
  <div class="container" style="max-width: 480px;">
    <div class="card">
      <div class="header-section">
        <img src="<?= logoData ?>" onerror="this.src='https://lh3.googleusercontent.com/d/1AQ79fhA_-JNXfYIbWXYQXmtKa-VNAiWq'" class="logo-img mb-3">
        <h4 class="fw-bold">ระบบลงเวลาปฏิบัติงาน</h4>
        <p class="text-muted small">สกร.ระดับเขตบางบอน</p>
        <div id="dateDisplay" class="badge bg-light text-primary rounded-pill p-2"></div>
      </div>
      
      <div class="card-body p-4">
        <form id="attendanceForm" onsubmit="handleFormSubmit(event)">
          <div class="mb-3">
            <label class="form-label">ชื่อ-นามสกุล</label>
            <select class="form-select" id="name" required onchange="autoFillPosition()">
              <option value="" disabled selected>เลือกรายชื่อ...</option>
              <option>นางสาวบุสรา นิลเต๊ะ</option>
              <option>นางผกามาศ เรืองจิรัษเฐียร</option>
              <option>นางสาวอรอุมา สุวัฒนกุลชัย</option>
              <option>นางสาวรัชนี ปาละโค</option>
              <option>ว่าที่ร้อยตรีหญิงเขมจิรา สวัสดี</option>
              <option>นางสาวรุ่งนภา สุขคุณา</option>
              <option>นายภูวณัฏฐ์ ไชยปัญญาวิชญ์</option>
              <option>นางสาวธิติมา กวาวมณี</option>
              <option>นายวิทยา เจือจันทร์</option>
              <option>นายอรรถพล กรุงแก้ว</option>
              <option>นางสาวสุภาวดี คงเกลี้ยง</option>
              <option>นายณดล จาริยพานิช</option>
              <option>นางสาวสิมิลัน อภิศักดิ์มนตรี</option>
              <option>นางสาวขวัญสุดา จำปา</option>
              <option>นางสมพร แสงงาม</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">ตำแหน่ง</label>
            <select class="form-select" id="position" required>
              <option value="" disabled selected>เลือกประเภทตำแหน่ง...</option>
              <option>ข้าราชการ</option>
              <option>พนักงานราชการ</option>
              <option>ลูกจ้าง/จ้างเหมาบริการ</option>
            </select>
          </div>

          <div class="mb-3">
            <label class="form-label">สถานะการปฏิบัติงาน</label>
            <select class="form-select" id="status" required onchange="toggleRemarkField()">
              <option value="" disabled selected>ระบุสถานะวันนี้...</option>
              <option>ปฏิบัติงาน ณ สำนักงาน</option>
              <option>ไปราชการ</option>
              <option>ลาป่วย</option>
              <option>ลากิจ</option>
              <option>ลาพักผ่อน</option>
              <option>ไปต่างประเทศ</option>
              <option>อื่น ๆ</option>
            </select>
          </div>

          <div class="mb-4" id="remarkContainer">
            <label class="form-label">รายละเอียดเพิ่มเติม <span class="text-danger">*</span></label>
            <textarea class="form-control" id="remark" rows="2" placeholder="ระบุสถานที่ หรือเหตุผล..."></textarea>
          </div>

          <button type="submit" class="btn btn-primary w-100 p-3 fw-bold" id="btnSubmit">บันทึกข้อมูล</button>
        </form>

        <div class="text-center mt-3">
          <button type="button" onclick="goToreport()" class="btn btn-link btn-sm text-decoration-none">ดูรายงานการลงเวลาย้อนหลัง</button>
        </div>
        <div id="msg" class="alert mt-4 text-center" style="display:none;"></div>
      </div>
    </div>
  </div>

  <script>
    const staffData = {
      "นางสาวบุสรา นิลเต๊ะ": "ข้าราชการ", 
      "นางผกามาศ เรืองจิรัษเฐียร": "ข้าราชการ", 
      "นางสาวอรอุมา สุวัฒนกุลชัย": "ข้าราชการ",
      "นางสาวรัชนี ปาละโค": "พนักงานราชการ", 
      "ว่าที่ร้อยตรีหญิงเขมจิรา สวัสดี": "พนักงานราชการ", 
      "นางสาวรุ่งนภา สุขคุณา": "พนักงานราชการ",
      "นายภูวณัฏฐ์ ไชยปัญญาวิชญ์": "พนักงานราชการ", 
      "นางสาวธิติมา กวาวมณี": "พนักงานราชการ", 
      "นายวิทยา เจือจันทร์": "พนักงานราชการ",
      "นายอรรถพล กรุงแก้ว": "พนักงานราชการ", 
      "นางสาวสุภาวดี คงเกลี้ยง": "พนักงานราชการ", 
      "นายณดล จาริยพานิช": "ลูกจ้าง/จ้างเหมาบริการ",
      "นางสาวสิมิลัน อภิศักดิ์มนตรี": "ลูกจ้าง/จ้างเหมาบริการ", 
      "นางสาวขวัญสุดา จำปา": "ลูกจ้าง/จ้างเหมาบริการ", 
      "นางสมพร แสงงาม": "ลูกจ้าง/จ้างเหมาบริการ"
    };

    document.getElementById('dateDisplay').innerText = new Date().toLocaleDateString('th-TH', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

    function autoFillPosition() {
      const name = document.getElementById('name').value;
      if (staffData[name]) document.getElementById('position').value = staffData[name];
    }

    function toggleRemarkField() {
      const status = document.getElementById('status').value;
      const isRequired = ['ไปราชการ', 'อื่น ๆ'].includes(status);
      document.getElementById('remarkContainer').style.display = isRequired ? 'block' : 'none';
      document.getElementById('remark').required = isRequired;
    }

    function handleFormSubmit(e) {
      e.preventDefault();
      const btn = document.getElementById('btnSubmit');
      btn.disabled = true;
      btn.innerText = 'กำลังบันทึก...';
      
      const data = {
        name: document.getElementById('name').value,
        position: document.getElementById('position').value,
        status: document.getElementById('status').value,
        remark: document.getElementById('remark').value
      };

      google.script.run.withSuccessHandler(res => {
        const msg = document.getElementById('msg');
        msg.className = 'alert mt-4 text-center alert-' + (res.success ? 'success' : 'danger');
        msg.innerHTML = res.message;
        msg.style.display = 'block';
        if (res.success) document.getElementById('attendanceForm').reset();
        btn.disabled = false;
        btn.innerText = 'บันทึกข้อมูล';
      }).saveData(data);
    }

    function goToreport() {
  Swal.fire({
    title: 'ยืนยันสิทธิ์เข้าถึง',
    text: 'กรุณาใส่รหัสผ่านเพื่อดูรายงาน',
    input: 'password',
    inputPlaceholder: 'ใส่รหัสผ่านที่นี่',
    showCancelButton: true,
    confirmButtonText: 'เข้าสู่ระบบ',
    cancelButtonText: 'ยกเลิก',
    confirmButtonColor: '#1a5276',
  }).then((result) => {
    if (result.isConfirmed) {
      const pass = "10150";
      if (result.value === pass) {
        google.script.run.withSuccessHandler(url => { 
          window.top.location.href = url + '?page=report'; 
        }).getAppUrl();
      } else {
        Swal.fire('ผิดพลาด', 'รหัสผ่านไม่ถูกต้อง!', 'error');
      }
    }
  });
}
  </script>
</body>
</html>
